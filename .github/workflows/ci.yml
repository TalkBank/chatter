name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Group runs by workflow + ref. The conditional cancel-in-progress
# expression was confusing in practice (cancelling main-branch runs
# when I'd expected only PR runs). Simpler and clearer: always allow
# every push to main to run, even if a faster one supersedes it. PRs
# can be re-triggered by pushing the branch again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default. Individual jobs can grant more if they need to.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Book toolchain. mdBook + mdbook-mermaid are pinned to current, kept in
  # lockstep with book.yml and the justfile. The mermaid preprocessor rewrites
  # fenced blocks; the mermaid assets render them via book.toml additional-js.
  # Link-checking is decoupled onto lychee (runs on the built HTML).
  MDBOOK_VERSION: '0.5.3'
  MDBOOK_MERMAID_VERSION: '0.17.0'
  LYCHEE_VERSION: '0.24.2'

jobs:
  rust:
    name: Rust build + test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Pinned in lockstep with rust-toolchain.toml (channel =
      # "1.96.1"). Drift against latest-stable is caught by the
      # weekly .github/workflows/clippy-rolling.yml job; bump this
      # action version + the rust-toolchain.toml channel together
      # when that job goes red.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      # The chatter-desktop Tauri crate links against GTK / webkit /
      # libsoup on Linux. If Tauri-on-Linux maintenance starts costing
      # more than it earns, move chatter-desktop into a workspace that's
      # excluded from default workspace build.
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Distinct caches per job so the rust and book jobs don't
          # invalidate each other.
          shared-key: rust-job

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      # Single-pass clippy (unified 2026-07-08). Production strictness
      # lives in the workspace [lints] deny table; test relaxation
      # lives in source (crate-root cfg_attr for unit tests, an
      # #![allow] header in each tests/*.rs). One flag set means one
      # build profile and a policy readable entirely from source.
      #
      # CI is the ONLY place clippy runs routinely: the local
      # developer loop and the pre-push gate deliberately skip it
      # (correctness is gated locally by tests; style/policy audit is
      # async here). A red clippy on main is a fix-forward cosmetic
      # commit, never a revert. Severity is two-tier and readable
      # from the workspace [lints] table alone: the panic-family
      # policy lints are deny (a violation of the no-panics house
      # rule is the ONLY thing that turns this job red); every other
      # lint surfaces as a warning annotation for leisure triage.
      # Drift pulse: the weekly clippy-rolling.yml job plus
      # opportunistic session sweeps (advisory lint rotted to ~100
      # warnings once before, 2026-05-29; leisure needs a pulse).
      - name: cargo clippy (single pass; red only on panic-policy denies)
        run: cargo clippy --workspace --all-targets --locked

  book:
    name: mdBook build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target (book tooling)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: book-job

      - name: Install mdbook + mdbook-mermaid + lychee
        run: |
          cargo install \
            mdbook@"${MDBOOK_VERSION}" \
            mdbook-mermaid@"${MDBOOK_MERMAID_VERSION}" \
            lychee@"${LYCHEE_VERSION}" \
            --locked

      - name: mdbook build
        run: cd book && mdbook build

      - name: Link-check book (lychee, offline)
        run: lychee --offline --root-dir "${GITHUB_WORKSPACE}/book/build" "${GITHUB_WORKSPACE}/book/build"

  rust-version-sync:
    name: Rust version pins in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # Cheap guard (pure Python, no Rust build): every numeric Rust-version
      # pin in the workflows must match its source of truth, the dev toolchain
      # from rust-toolchain.toml or, for the marked MSRV pin, Cargo.toml
      # rust-version. Bumping Rust is then: edit the source file, run
      # `just rust-sync`, and this job enforces no pin was missed.
      - name: Check Rust version pins
        run: python3 scripts/sync-rust-versions.py --check

  app-version-sync:
    name: App version in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # Cheap guard (pure Python, no build): the app version must match across the
      # canonical [workspace.package] version, tauri.conf.json, package.json, and a
      # CHANGELOG entry. Bumping the version is then: edit Cargo.toml, run
      # `just app-sync`, add a CHANGELOG entry; this job enforces no file was
      # missed. Prevents the desktop bundle-vs-updater version drift that broke the
      # first v0.1.1 desktop release.
      - name: Check app version sync
        run: python3 scripts/sync-app-version.py --check

  shellcheck:
    name: Shell scripts (shellcheck, strictest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # Every tracked shell script must pass shellcheck at its default
      # (strictest) severity. ubuntu-latest ships shellcheck; the runner finds
      # every *.sh plus shebang scripts via git ls-files. See CLAUDE.md.
      - name: shellcheck all shell scripts
        run: bash scripts/lint/shellcheck-all.sh
