name: Cross-platform

# Cross-platform health check for the Rust build. Runs on push to main
# and nightly via cron. Kept separate from the primary CI workflow so
# platform-specific transient issues (Windows runner flakiness, macOS
# keychain prompts, GitHub-hosted runner image churn) don't block the
# main CI badge. The primary CI on Ubuntu remains the merge gate; this
# workflow is a leading indicator for distribution readiness.

on:
  push:
    branches: [main]
  schedule:
    # 11:00 UTC daily. Catches dependency drift on macOS / Windows
    # toolchains without waiting for the next push.
    - cron: '0 11 * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7

      # Pinned to the repo toolchain (rust-toolchain.toml), not @stable: a
      # floating @stable re-keys the rust-cache on every new stable release,
      # forcing a cold full rebuild on all three OSes (the slow Windows leg),
      # and tests a different compiler than we ship. Kept in sync by
      # scripts/sync-rust-versions.py.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      # Tauri Linux system deps. macOS bundles equivalents; Windows
      # uses WebView2 (preinstalled on runner images).
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-platform-${{ matrix.os }}

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo test --workspace
        run: cargo test --workspace --locked
