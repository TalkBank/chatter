# Release Desktop: builds the chatter-desktop (Tauri) installers on a version
# tag and uploads them into the SAME GitHub Release that the cargo-dist
# release.yml creates for that tag.
#
# Division of labor per docs/strategy/distribution-and-signing.md
# ("Decisions, 2026-06-12"): release.yml (cargo-dist, autogenerated) owns the
# GitHub Release and the CLI artifacts; this workflow only ADDS desktop
# installers to it, so it waits for the release to exist before uploading.
#
# macOS artifacts are codesigned, notarized, and stapled. Tauri signs,
# notarizes, and staples the .app but NOT the .dmg it wraps around it, so this
# workflow submits the .dmg itself to the notary service and staples it (the
# same fix as the local reference script). Windows and Linux artifacts are
# unsigned for now; see the strategy doc's "Decisions" section.
#
# Secrets (macOS jobs only; names documented in
# book/src/contributing/ci-and-release.md):
#   APPLE_CERTIFICATE              base64-encoded Developer ID .p12
#   APPLE_CERTIFICATE_PASSWORD     password for the .p12
#   APPLE_SIGNING_IDENTITY         e.g. "Developer ID Application: ... (TEAMID)"
#   APPLE_API_KEY                  App Store Connect API key ID
#   APPLE_API_ISSUER               App Store Connect issuer ID
#   APPLE_API_KEY_CONTENT          contents of the AuthKey_*.p8 file
#
# Auto-update secrets (ALL build jobs, every platform: the Tauri updater signs
# its bundles wherever createUpdaterArtifacts builds):
#   TAURI_SIGNING_PRIVATE_KEY           Tauri updater minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password
# The matching public key lives in tauri.conf.json (plugins.updater.pubkey).
# tauri.conf.json sets createUpdaterArtifacts: true, so `tauri build` REQUIRES
# these; a keyless bundle build fails. See
# docs/strategy/distribution-and-signing.md "Auto-update".
#
# workflow_dispatch runs in build-only mode: artifacts are attached to the
# workflow run for inspection and no release upload happens. Use it to
# exercise the build (including signing, if secrets are present) without
# tagging.

name: Release Desktop

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  DESKTOP_DIR: apps/chatter-desktop

jobs:
  macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v7

      # Pinned in lockstep with rust-toolchain.toml, same as ci.yml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-06-12
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/chatter-desktop/package-lock.json

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-desktop-${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: ${{ env.DESKTOP_DIR }}
        run: npm ci

      # Ephemeral signing keychain, the same pattern as the local reference
      # script: the keychain lives in RUNNER_TEMP and dies with the runner.
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS=$(openssl rand -hex 24)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -t cert -f pkcs12 -A \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" > /dev/null
          rm "$RUNNER_TEMP/cert.p12"

      - name: Write notarization API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      # Tauri signs/notarizes/staples the .app when the APPLE_* env vars are
      # set; the identity is supplied here, never hardcoded in tauri.conf.json.
      - name: Build, sign, and notarize the app
        working-directory: ${{ env.DESKTOP_DIR }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Sign the updater bundle (.app.tar.gz) with the Tauri updater key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- -t ${{ matrix.target }}

      - name: Notarize and staple the dmg
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          dmgs=(target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          DMG="${dmgs[0]}"
          xcrun notarytool submit "$DMG" \
            --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Verify signing, notarization, and staple
        run: |
          set -euo pipefail
          apps=(target/${{ matrix.target }}/release/bundle/macos/*.app)
          APP="${apps[0]}"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute -vv "$APP"
          xcrun stapler validate "$APP"
          codesign -dv --verify "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"
          xcrun stapler validate "$DMG"

      # The updater bundle (signed .app.tar.gz) is distinct from the .dmg the
      # user double-clicks: the .dmg is the manual installer, the .app.tar.gz +
      # .sig is what the updater downloads. Record a sidecar for the manifest
      # job to assemble latest.json.
      - name: Collect updater artifact
        run: |
          set -euo pipefail
          bundles=(target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz)
          BUNDLE="${bundles[0]}"
          SIG="${BUNDLE}.sig"
          node apps/chatter-desktop/scripts/write-sidecar.mjs \
            "${{ matrix.target }}" "$BUNDLE" "$SIG" "$RUNNER_TEMP/sidecar"
          echo "UPDATER_BUNDLE=$BUNDLE" >> "$GITHUB_ENV"
          echo "UPDATER_SIG=$SIG" >> "$GITHUB_ENV"

      - name: Attach dmg to the workflow run
        uses: actions/upload-artifact@v7
        with:
          name: chatter-desktop-${{ matrix.target }}
          path: ${{ env.DMG }}
          if-no-files-found: error

      - name: Attach updater sidecar to the workflow run
        uses: actions/upload-artifact@v7
        with:
          name: updater-sidecar-${{ matrix.target }}
          path: ${{ runner.temp }}/sidecar/*.json
          if-no-files-found: error

      - name: Upload dmg and updater bundle to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # release.yml (cargo-dist) creates the release at the end of its
          # host step; poll until it exists (up to 45 minutes).
          for i in $(seq 1 90); do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ERROR: release $GITHUB_REF_NAME never appeared" >&2
              exit 1
            fi
            sleep 30
          done
          gh release upload "$GITHUB_REF_NAME" "$DMG" "$UPDATER_BUNDLE" "$UPDATER_SIG" \
            --repo "$GITHUB_REPOSITORY" --clobber

  windows:
    name: Windows (x86_64, unsigned)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-06-12
        with:
          toolchain: 1.96.0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/chatter-desktop/package-lock.json

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-desktop-windows

      - name: Install frontend dependencies
        working-directory: ${{ env.DESKTOP_DIR }}
        run: npm ci

      # Unsigned (Authenticode) by decision; SmartScreen workarounds are
      # documented in the install docs. The Tauri UPDATER bundle is still
      # signed with the updater minisign key (a separate concern from
      # Authenticode), so the updater secrets are required here too.
      - name: Build the installer
        working-directory: ${{ env.DESKTOP_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Locate installer and updater bundle
        shell: bash
        run: |
          set -euo pipefail
          exes=(target/release/bundle/nsis/*-setup.exe)
          EXE="${exes[0]}"
          echo "INSTALLER=$EXE" >> "$GITHUB_ENV"
          # Tauri's NSIS updater artifact is the signed -setup.exe itself (with a
          # .sig sidecar); this Tauri version produces no separate .nsis.zip, so
          # the updater bundle is the installer .exe.
          BUNDLE="$EXE"
          SIG="${EXE}.sig"
          # Write the sidecar to a workspace-relative, forward-slash dir. On
          # Windows $RUNNER_TEMP is a backslash path (D:\a\_temp), and a
          # backslash glob in upload-artifact is read as escape sequences, so the
          # upload finds no files. A relative "sidecar" dir avoids that.
          node apps/chatter-desktop/scripts/write-sidecar.mjs \
            "x86_64-pc-windows-msvc" "$BUNDLE" "$SIG" "sidecar"
          echo "UPDATER_BUNDLE=$BUNDLE" >> "$GITHUB_ENV"
          echo "UPDATER_SIG=$SIG" >> "$GITHUB_ENV"

      - name: Attach installer to the workflow run
        uses: actions/upload-artifact@v7
        with:
          name: chatter-desktop-windows-x86_64
          path: ${{ env.INSTALLER }}
          if-no-files-found: error

      - name: Attach updater sidecar to the workflow run
        uses: actions/upload-artifact@v7
        with:
          name: updater-sidecar-windows-x86_64
          path: sidecar/*.json
          if-no-files-found: error

      - name: Upload installer and updater bundle to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ERROR: release $GITHUB_REF_NAME never appeared" >&2
              exit 1
            fi
            sleep 30
          done
          # UPDATER_BUNDLE is the same -setup.exe as INSTALLER, so upload the
          # installer once plus its updater .sig.
          gh release upload "$GITHUB_REF_NAME" "$INSTALLER" "$UPDATER_SIG" \
            --repo "$GITHUB_REPOSITORY" --clobber

  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-06-12
        with:
          toolchain: 1.96.0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/chatter-desktop/package-lock.json

      # Same dependency list as ci.yml's Tauri Linux deps.
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-desktop-linux

      - name: Install frontend dependencies
        working-directory: ${{ env.DESKTOP_DIR }}
        run: npm ci

      - name: Build the bundles
        working-directory: ${{ env.DESKTOP_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Locate bundles and updater artifact
        run: |
          set -euo pipefail
          debs=(target/release/bundle/deb/*.deb)
          DEB="${debs[0]}"
          appimages=(target/release/bundle/appimage/*.AppImage)
          APPIMAGE="${appimages[0]}"
          echo "DEB=$DEB" >> "$GITHUB_ENV"
          echo "APPIMAGE=$APPIMAGE" >> "$GITHUB_ENV"
          # For Linux the updater re-uses the AppImage itself; the signature is
          # the sidecar .sig next to it.
          SIG="${APPIMAGE}.sig"
          echo "UPDATER_SIG=$SIG" >> "$GITHUB_ENV"
          node apps/chatter-desktop/scripts/write-sidecar.mjs \
            "x86_64-unknown-linux-gnu" "$APPIMAGE" "$SIG" "$RUNNER_TEMP/sidecar"

      - name: Attach bundles to the workflow run
        uses: actions/upload-artifact@v7
        with:
          name: chatter-desktop-linux-x86_64
          path: |
            ${{ env.DEB }}
            ${{ env.APPIMAGE }}
          if-no-files-found: error

      - name: Attach updater sidecar to the workflow run
        uses: actions/upload-artifact@v7
        with:
          name: updater-sidecar-linux-x86_64
          path: ${{ runner.temp }}/sidecar/*.json
          if-no-files-found: error

      - name: Upload bundles and updater signature to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ERROR: release $GITHUB_REF_NAME never appeared" >&2
              exit 1
            fi
            sleep 30
          done
          gh release upload "$GITHUB_REF_NAME" "$DEB" "$APPIMAGE" "$UPDATER_SIG" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Aggregate the per-platform sidecars into the static latest.json the Tauri
  # updater reads from the release. Runs only on a real tag (it uploads to the
  # release) and only after all three build jobs have published their bundles +
  # sidecars. The structure-building logic is unit-tested
  # (apps/chatter-desktop/scripts/generate-latest-json.mjs + latestJson.test.mjs).
  updater-manifest:
    name: Updater manifest (latest.json)
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download updater sidecars
        uses: actions/download-artifact@v8
        with:
          pattern: updater-sidecar-*
          path: sidecars
          merge-multiple: true

      - name: Generate latest.json
        run: |
          set -euo pipefail
          # Separate declare + assign so the date(1) exit status is not masked
          # by `export` (shellcheck SC2155).
          UPDATER_PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export UPDATER_PUB_DATE
          export UPDATER_VERSION="${GITHUB_REF_NAME#v}"
          export UPDATER_TAG="$GITHUB_REF_NAME"
          export UPDATER_REPO="$GITHUB_REPOSITORY"
          node apps/chatter-desktop/scripts/generate-latest-json.mjs sidecars latest.json
          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --repo "$GITHUB_REPOSITORY" --clobber
