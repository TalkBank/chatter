# actionlint configuration.
#
# release.yml is generated by cargo-dist (do not hand-edit; it is regenerated
# by `dist init`). Its run-blocks trip two info-level shellcheck STYLE rules
# that are not ours to fix: SC2086 (quote to prevent word-splitting) and
# SC2129 (group redirects). We ignore only those two codes, only in that one
# generated file, so actionlint still catches real errors (expression typos,
# bad action inputs, undefined vars) everywhere, including in release.yml.
# Our hand-written workflows carry no ignores; their nits were fixed instead.
paths:
  .github/workflows/release.yml:
    ignore:
      - 'shellcheck reported issue in this script: SC2086'
      - 'shellcheck reported issue in this script: SC2129'
